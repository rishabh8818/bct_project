<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Vault | NiT Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --nit-blue: #1a3a83;
            --nit-sky: #00a0e3;
            --white: #ffffff;
            --bg-dark: #0f172a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body {
            background: radial-gradient(circle at top right, var(--nit-blue), var(--bg-dark));
            min-height: 100vh;
            color: var(--white);
            padding: 40px 5%;
        }
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .back-btn {
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .back-btn:hover { background: var(--nit-sky); }
        
        h1 { font-size: 35px; font-weight: 900; }
        h1 span { color: var(--nit-sky); }

        /* Book Table Styling */
        .vault-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th {
            text-align: left;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--nit-sky);
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 15px;
        }
        tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        .category-tag {
            background: var(--nit-blue);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            border: 1px solid var(--nit-sky);
        }
        .empty-msg {
            text-align: center;
            padding: 40px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="header-area">
        <h1>BOOK <span>VAULT</span></h1>
        <a href="{% url 'dashboard' %}" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>

    <div class="vault-card">
        <table>
            <thead>
                <tr>
                    <th>Book Title</th>
                    <th>Author</th>
                    <th>ISBN / Code</th>
                    <th>Category</th>
                </tr>
            </thead>
            <tbody>
                {% for book in books %}
                <tr>
                    <td style="font-weight: 600;">{{ book.title }}</td>
                    <td>{{ book.author }}</td>
                    <td style="color: #94a3b8;">{{ book.isbn }}</td>
                    <td><span class="category-tag">{{ book.category }}</span></td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="empty-msg">
                        <i class="fas fa-box-open" style="font-size: 40px; margin-bottom: 10px; display: block;"></i>
                        Oops! Library mein abhi koi book nahi hai.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
