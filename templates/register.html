<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Registration | NiT Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nit-blue: #1a3a83;
            --nit-green: #8dc63f;
            --white: #ffffff;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffffff 55%, var(--nit-blue) 55.1%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        .nit-corner-text {
            position: absolute;
            bottom: 4%;
            right: 5%;
            font-size: 12vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.12);
            z-index: 1;
            pointer-events: none;
            user-select: none;
            letter-spacing: -5px;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 35px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.25);
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .register-card h1 {
            color: var(--nit-blue);
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 5px;
            text-align: center;
            letter-spacing: -1px;
        }

        .register-card p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full { grid-column: span 2; }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--nit-blue);
            margin-bottom: 6px;
            padding-left: 5px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 13px 18px;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            border-radius: 15px;
            font-size: 14px;
            transition: 0.3s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--nit-green);
            background: #fff;
            box-shadow: 0 5px 15px rgba(141, 198, 63, 0.1);
        }

        .error-box {
            background: #ff4757;
            color: white;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3);
        }

        .reg-btn {
            width: 100%;
            padding: 16px;
            background: var(--nit-blue);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(26, 58, 131, 0.2);
        }

        .reg-btn:hover {
            background: var(--nit-green);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(141, 198, 63, 0.3);
        }

        .footer-links {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
        }

        .footer-links a {
            color: var(--nit-blue);
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .footer-links a:hover {
            color: var(--nit-green);
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full { grid-column: span 1; }
            .nit-corner-text { font-size: 25vw; bottom: 2%; }
        }
    </style>
</head>
<body>

    <div class="nit-corner-text">NiT</div>

    <div class="register-card">
        <h1>New Member</h1>
        <p>Registration Portal | NiT Central Library</p>

        {% if error %}
            <div class="error-box">
                ⚠️ {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-grid">
                <div class="form-group full">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Your Name" 
                           pattern="[A-Za-z\s]+" title="PLEASE ENTER ALBHABETS ONLY" required>
                </div>

                <div class="form-group">
                    <label>Branch</label>
                    <select name="branch" required>
                        <option value="" disabled selected>Select</option>
                        <option value="CSE">CSE</option>
                        <option value="IT">IT</option>
                        <option value="ECE">ECE</option>
                        <option value="EE">EE</option>
                        <option value="ME">ME</option>
                        <option value="CE">CE</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Roll No</label>
                    <input type="text" name="roll" placeholder="College Roll" 
                           inputmode="numeric" pattern="[0-9]+" title="ONLY NUMBEERS ARE ALLOWED" required>
                </div>

                <div class="form-group full">
                    <label>Student ID (Username)</label>
                    <input type="text" name="student_id" placeholder="NIT/202x/xxxx" required>
                </div>

                <div class="form-group full">
                    <label>Create Password</label>
                    <input type="password" name="password" placeholder="••••••••" minlength="6" required>
                </div>
            </div>

            <button type="submit" class="reg-btn">Complete Registration</button>
        </form>

        <div class="footer-links">
            <span style="color: #64748b;">Already a member?</span> 
            <a href="{% url 'login_url' %}">Sign In</a> <br><br>
            <a href="{% url 'index' %}" style="color: var(--nit-green); font-weight: 600;">← Back to Home</a>
        </div>
    </div>

</body>
</html>
