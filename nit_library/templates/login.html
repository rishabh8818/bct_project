<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NiT Library | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nit-blue: #1a3a83;
            --nit-green: #8dc63f;
            --light-blue: #eef2ff;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background: linear-gradient(135deg, var(--white) 60%, var(--nit-blue) 60.5%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 450px;
            padding: 50px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            position: relative;
            z-index: 10;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-box h1 {
            color: var(--nit-blue);
            font-weight: 800;
            font-size: 32px;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .login-box p { color: #64748b; font-size: 14px; margin-bottom: 35px; }

        .form-group { text-align: left; margin-bottom: 22px; }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--nit-blue);
            margin-bottom: 8px;
            padding-left: 5px;
        }

        select, input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            border-radius: 18px;
            font-size: 15px;
            outline: none;
            transition: 0.3s all ease;
        }

        select:focus, input:focus {
            border-color: var(--nit-green);
            background: #fff;
            box-shadow: 0 5px 15px rgba(141, 198, 63, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--nit-blue);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
            box-shadow: 0 10px 25px rgba(26, 58, 131, 0.2);
        }

        .login-btn:hover {
            background: var(--nit-green);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(141, 198, 63, 0.3);
        }

        .error-msg {
            color: #ef4444;
            background: #fef2f2;
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #fee2e2;
        }

        .links { margin-top: 30px; font-size: 14px; }
        .links a { color: #94a3b8; text-decoration: none; transition: 0.3s; }
        .links a:hover { color: var(--nit-blue); font-weight: 600; }
        .back-home { display: block; margin-top: 20px; color: var(--nit-green) !important; font-weight: 600; }

        .bg-brand {
            position: absolute; bottom: 5%; right: 5%;
            font-size: 150px; font-weight: 900;
            color: rgba(255, 255, 255, 0.1); pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="bg-brand">NiT</div>

    <div class="login-box">
        <h1>USER SIGN IN</h1>
        <p>Narula Institute of Technology - Library</p>

        {% if error %}
        <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST" action=".">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Login As</label>
                <select name="role" required>
                    <option value="" disabled selected>Choose your role</option>
                    <option value="Student">Student</option>
                    <option value="Admin">Librarian / Admin</option>
                </select>
            </div>

            <div class="form-group">
                <label>Registration ID / Username</label>
                <input type="text" name="username" placeholder="Enter your ID" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Log In to Library Dashboard</button>
        </form>

        <div class="links">
            <span style="color: #94a3b8;">New student?</span> <a href="{% url 'register' %}" style="color: var(--nit-blue); font-weight: 600;">Register Here</a><br>
            <a href="{% url 'index' %}" class="back-home">← Back to Homepage</a>
        </div>
    </div>

</body>
</html>
